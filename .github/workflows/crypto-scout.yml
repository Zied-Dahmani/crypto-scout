name: Crypto Scout

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
      TWITTER_SCRAPER_USERNAME: ${{ secrets.TWITTER_SCRAPER_USERNAME }}
      TWITTER_SCRAPER_PASSWORD: ${{ secrets.TWITTER_SCRAPER_PASSWORD }}
      TWITTER_SCRAPER_EMAIL: ${{ secrets.TWITTER_SCRAPER_EMAIL }}
      TIKTOK_USERNAME: ${{ secrets.TIKTOK_USERNAME }}
      TIKTOK_PASSWORD: ${{ secrets.TIKTOK_PASSWORD }}
      TIKTOK_SESSION: ${{ secrets.TIKTOK_SESSION }}
      COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run pipeline
        run: python main.py
